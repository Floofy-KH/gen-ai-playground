# configs/prompt_templates.yaml
#
# Reusable prompt templates and anchor patterns.
#
# Templates use Python str.format()-style {slot} placeholders.
# The {anchor} slot is always populated from the "anchor" field of the same
# template block (or passed explicitly at runtime).
#
# Usage (Python):
#
#   from src.utils.prompt_helpers import PromptTemplate
#   import yaml
#
#   with open("configs/prompt_templates.yaml") as f:
#       cfg = yaml.safe_load(f)
#
#   t_cfg = cfg["templates"]["character_scene"]
#   template = PromptTemplate(**t_cfg)
#   prompt = template.build(action="exploring a cave", setting="underground grotto")

# ---------------------------------------------------------------------------
# Quality booster tags (appended to every prompt by convention)
# ---------------------------------------------------------------------------

quality_tags:
  illustration:
    - "masterpiece"
    - "best quality"
    - "highly detailed"
    - "sharp focus"
    - "illustration"
  anime:
    - "masterpiece"
    - "best quality"
    - "highly detailed"
    - "anime style"
    - "vibrant colors"
  concept_art:
    - "concept art"
    - "artstation"
    - "trending on artstation"
    - "professional illustration"
    - "detailed"
  painterly:
    - "oil painting"
    - "artstation"
    - "trending"
    - "detailed brushwork"
  # Kept as reference for the rare photorealistic use-case:
  photorealistic:
    - "photorealistic"
    - "8k uhd"
    - "detailed"
    - "sharp focus"
    - "cinematic lighting"

# ---------------------------------------------------------------------------
# Global negative prompt
# ---------------------------------------------------------------------------

global_negative_prompt: >
  photorealistic, realistic, photograph, 3D render, CGI,
  blurry, low quality, low resolution, jpeg artefacts, deformed, ugly,
  extra limbs, missing limbs, bad anatomy, text, watermark, signature,
  cropped, out of frame, duplicate, worst quality

# ---------------------------------------------------------------------------
# Prompt templates
# ---------------------------------------------------------------------------

templates:

  # ── Character consistency template ──────────────────────────────────────
  # Use this when generating multiple scenes featuring the same character.
  # Fill {action} and {setting} per generation; keep anchor fixed.
  character_scene:
    anchor: "sks character, anime style, 1girl, blue eyes, long silver hair"
    template: "{anchor}, {action}, {setting}, dramatic lighting, masterpiece"
    negative_prompt: "photorealistic, realistic, blurry, deformed, extra limbs, bad anatomy, watermark"
    quality_tags:
      - "best quality"
      - "highly detailed"

  # ── Style consistency template ───────────────────────────────────────────
  # Use this when generating multiple images in the same artistic style.
  style_transfer:
    anchor: "<my-style>"
    template: "a <my-style> {subject}, {setting}, masterpiece"
    negative_prompt: "photorealistic, 3D render, blurry"
    quality_tags:
      - "artstation"
      - "highly detailed"
      - "illustration"

  # ── Concept art / environment template ──────────────────────────────────
  environment:
    anchor: "fantasy {biome}, concept art"
    template: "{anchor}, {time_of_day}, {weather}, epic vista, digital painting"
    negative_prompt: "photorealistic, people, characters, text, watermark"
    quality_tags:
      - "artstation"
      - "trending on artstation"
      - "highly detailed"

  # ── Product / object consistency template ───────────────────────────────
  product_shot:
    anchor: "sks object, illustrated style, clean background"
    template: "{anchor}, {action}, product illustration"
    negative_prompt: "photorealistic, photograph, cluttered, busy background"
    quality_tags:
      - "masterpiece"
      - "best quality"

# ---------------------------------------------------------------------------
# Example anchor strings
# ---------------------------------------------------------------------------
# Copy and paste these as the "anchor" field in templates above, or use them
# directly in build_anchored_prompt() calls.

anchors:
  fantasy_warrior: "sks warrior, plate armour, magical sword, glowing runes, anime style"
  anime_character: "sks character, 1girl, blue eyes, long silver hair, school uniform, anime style"
  robot: "sks robot, sleek metallic body, glowing blue eyes, humanoid, concept art style"
  wizard: "sks wizard, dark robes, glowing staff, arcane symbols, fantasy illustration"
  dragon: "sks dragon, scales, wings spread, fantasy illustration, artstation"
