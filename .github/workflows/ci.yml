name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, format & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install only the lightweight dependencies needed for pure-Python tests
      # (no torch/diffusers/etc. — those require a GPU runner).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Dev extras: pytest, pytest-cov, ruff, black
          pip install -e ".[dev]"
          # Light runtime deps required by the tested modules
          pip install Pillow numpy

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing
