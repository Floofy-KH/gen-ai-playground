name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, format & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Install only the lightweight dependencies needed for pure-Python tests
      # (no torch/diffusers/etc. — those require a GPU runner).
      # uv sync enforces uv.lock so versions are fully reproducible.
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with black
        run: uv run black --check .

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=term-missing
